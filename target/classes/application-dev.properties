spring.datasource.url=jdbc:mysql://localhost:3306/healthsupport?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=888@Aaha
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# ============================================================
# HIBERNATE & JPA CONFIGURATION
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.generate_statistics=false

# ============================================================
# LOGGING CONFIGURATION - VERBOSE FOR DEV
# ============================================================
logging.level.root=INFO
logging.level.org.springframework.boot=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.healthsupport=DEBUG

# ============================================================
# JWT CONFIGURATION
# ============================================================
jwt.secret=dev-secret-key-change-in-production
jwt.expiration=86400000

